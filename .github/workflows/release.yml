name: Release

# Build installer + update zips and publish a GitHub Release whenever a version
# tag is pushed (e.g. `git tag v1.5.1 && git push origin v1.5.1`).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sanity-check that the tag matches app/version.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(node -p "require('./app/version.json').version")"
          echo "tag=$TAG  version.json=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match app/version.json ($VER). Bump version.json or fix the tag."
            exit 1
          fi

      - name: Build release artifacts
        run: bash scripts/build-release.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/aurora-photos-installer-*.zip \
            dist/aurora-photos-update-*.zip \
            --title "Aurora Photos $GITHUB_REF_NAME" \
            --generate-notes
